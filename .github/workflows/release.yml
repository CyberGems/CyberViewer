name: Release Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build & Publish Windows Installer
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit Tests
        run: npm test

      # Build only — never let electron-builder publish on tag (avoids double-upload + API flakes).
      - name: Compile and Package Electron App
        run: npm run build
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload Build Artifacts to Actions Run
        uses: actions/upload-artifact@v4
        with:
          name: CyberViewer-Windows-Installer
          path: |
            dist/*.exe
            dist/*.blockmap
            dist/latest.yml
          if-no-files-found: error

      # Prefer gh CLI with retries over a single softprops call — GitHub has been
      # returning intermittent 503s during release create/upload.
      - name: Create GitHub Release and Upload Assets
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          FILES=(dist/*.exe dist/*.blockmap dist/latest.yml)

          retry() {
            local attempt=1
            local max=6
            local delay=8
            until "$@"; do
              if [ "$attempt" -ge "$max" ]; then
                echo "Giving up after ${max} attempts: $*" >&2
                return 1
              fi
              echo "Attempt ${attempt}/${max} failed; retrying in ${delay}s..." >&2
              sleep "$delay"
              attempt=$((attempt + 1))
              delay=$((delay * 2))
            done
          }

          ensure_release() {
            if gh release view "$TAG" >/dev/null 2>&1; then
              # Publish draft leftovers from a previous flaky run
              gh release edit "$TAG" --draft=false >/dev/null 2>&1 || true
              return 0
            fi
            gh release create "$TAG" \
              --title "$TAG" \
              --generate-notes \
              --latest
          }

          retry ensure_release

          shopt -s nullglob
          for f in "${FILES[@]}"; do
            echo "Uploading $f"
            retry gh release upload "$TAG" "$f" --clobber
          done

          echo "Release ${TAG} published:"
          gh release view "$TAG" --json url,isDraft,assets --jq '{url,isDraft,assets:[.assets[].name]}'
